<!DOCTYPE html>
<html>
<head>
  <title>Pose Animation</title>
  <style>
    canvas {
      background: #000;
      display: block;
      margin: 0 auto;
      border: 2px solid #555;
    }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>





<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const W = canvas.width;
const H = canvas.height;

// Skeleton connections (MediaPipe format)
const connections = [
  [0, 11], [0, 12],               // head to shoulders
  [11, 13], [13, 15], [12, 14], [14, 16],
  [11, 12], [23, 24], [11, 23], [12, 24],
  [23, 25], [25, 27], [24, 26], [26, 28]
];

let poseData = [];
let currentFrame = 0;
const FPS = 12;

// Load pose data
fetch("pose_keypoints (3).json")
  .then(res => res.json())
  .then(data => {
    poseData = data;
    requestAnimationFrame(animate);
  });

  


// Draw a single frame
function drawFrame(frame) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "red";

  const points = frame.map(p => ({
    x: W / 2 + p.x * 200,
    y: H / 2 + p.y * 200 // Flip y
  }));

  // Draw connections
  ctx.strokeStyle = "gray";
  ctx.lineWidth = 2;
  connections.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(points[a].x, points[a].y);
    ctx.lineTo(points[b].x, points[b].y);
    ctx.stroke();
  });

  // Draw joints
  points.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 1, Math.PI * 2);
    ctx.fill();
  });
}

// Animation loop
function animate() {
  if (poseData.length === 0) return;

  drawFrame(poseData[currentFrame]);
  currentFrame = (currentFrame + 1) % poseData.length;

  setTimeout(() => {
    requestAnimationFrame(animate);
  }, 1000 / FPS);
}
</script>
</body>
</html>
